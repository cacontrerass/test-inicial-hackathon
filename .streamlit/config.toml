[theme]
primaryColor = "#C8102E"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F4F4"
textColor = "#1A1A1A"
font = "sans serif"

[server]
maxUploadSize = 50

# Oculta el menu hamburguesa (... arriba a la derecha), que en Cloud
# incluye el link "View source" al repo de GitHub. Tambien quita el
# boton "Deploy" en modo local.
[client]
toolbarMode = "minimal"
showErrorDetails = false
